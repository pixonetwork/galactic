<style>
  #container {
    width: 100%;
    height: 100%;
  }
html, body { height: 100%; margin: 0; }
</style>
<div id="container"></div>
<title>The Impossible Quiz 2!</title>
<script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2025.10.2/ruffle.min.js"></script>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.addEventListener("load", (event) => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    const container = document.getElementById("container");
    container.appendChild(player);

    player.style.width = "100%";
    player.style.height = "100%";

    player.load({
      url: "https://cdn.jsdelivr.net/gh/bubbls/UGS-file-encryption@1500a41d490b7455b4f3c8bfe2922687e18a6083/theimpossiblequiz2.swf",
      backgroundColor: "#000",
  });
  });
</script>
