    <script>
      var buildUrl = "https://cdn.jsdelivr.net/gh/ertemr33/saf@main/Build";
      var loaderUrl = buildUrl + "/oopsNoBrakes.loader.js";

      // --- 🔹 Parçaları birleştirme fonksiyonu ---
      async function mergeParts(baseFileName, partCount) {
        const parts = [];
        for (let i = 1; i <= partCount; i++) {
          const url = `${buildUrl}/${baseFileName}.part${i}`;
          const response = await fetch(url);
          if (!response.ok) throw new Error("Dosya yüklenemedi: " + url);
          const blob = await response.blob();
          parts.push(blob);
        }
        return new Blob(parts);
      }

      // --- 🔹 .data.gz ve .wasm.gz dosyalarını birleştir ---
      async function prepareUnityFiles() {
        const dataBlob = await mergeParts("oopsNoBrakes.data.gz", 3); // 4 parçaydı
        const wasmBlob = await mergeParts("oopsNoBrakes.wasm.gz", 3); // 3 parçaydı

        const dataUrl = URL.createObjectURL(dataBlob);
        const wasmUrl = URL.createObjectURL(wasmBlob);
        return { dataUrl, wasmUrl };
      }

      // --- 🔹 Unity yükleme işlemi ---
      prepareUnityFiles().then(({ dataUrl, wasmUrl }) => {
        var config = {
          dataUrl: dataUrl,
          frameworkUrl: buildUrl + "/oopsNoBrakes.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "TheJaspel",
          productName: "Oops! No Brakes",
          productVersion: "1",
        };

        var canvas = document.querySelector("#unity-canvas");

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            // progress bar yok, gerek yok
          }).then((unityInstance) => {
            // Otomatik tam ekran yap
            unityInstance.SetFullscreen(1);
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }).catch((err) => {
        alert("Dosya yüklenemedi: " + err.message);
      });
    </script>
